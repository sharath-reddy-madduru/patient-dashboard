<!DOCTYPE html>
<html>
<head>
    <title>Health Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="menu">
        <h2>HealthCare</h2>
        <p>Dashboard</p>
        <p>Patients</p>
        <p>Reports</p>
    </div>

    <!-- Main Content -->
    <div class="content">

        <!-- Add Patient -->
        <div class="card">
            <h2>Add Patient</h2>
            <input type="text" placeholder="Name">
            <input type="number" placeholder="Age">
            <input type="text" placeholder="Gender">
            <button>Add Patient</button>
        </div>

        <!-- Patient Info -->
        <h1>Patient Info</h1>

        <div class="card" id="patientCard">
            <h3>Loading...</h3>
            <p>Age: --</p>
            <p>Gender: --</p>
        </div>

        <!-- Heart Rate -->
        <div class="card">
            <h3>Heart Rate</h3>
            <p>72 bpm</p>
        </div>

        <!-- Blood Pressure -->
        <div class="card">
            <h3>Blood Pressure</h3>
            <canvas id="bpChart"></canvas>
        </div>

    </div>

</div>

<script>

// Fetch + UI update
async function loadData() {
    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users/1");
        await response.json(); // just to simulate API usage

        // Update UI (as per instruction: only Jessica)
        document.querySelector("#patientCard h3").innerText = "Jessica Taylor";
        document.querySelector("#patientCard p:nth-child(2)").innerText = "Age: 28";
        document.querySelector("#patientCard p:nth-child(3)").innerText = "Gender: Female";

        // Chart
        const ctx = document.getElementById('bpChart');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                datasets: [{
                    label: 'Blood Pressure',
                    data: [120, 130, 125, 140, 135],
                    borderColor: 'blue',
                    fill: false
                }]
            }
        });

    } catch (error) {
        console.log("Error:", error);
    }
}

loadData();

</script>

</body>
</html>
